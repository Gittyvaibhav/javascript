<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app-shell">
        <section class="game-panel">
            <h1>Tic-Tac-Toe</h1>

            <div class="status-card">
                <p class="status-label">Status</p>
                <p id="status-msg" class="status-msg">Player O's turn</p>
            </div>

            <div class="container">
                <div class="game">
                    <button class="box" aria-label="Cell 1"></button>
                    <button class="box" aria-label="Cell 2"></button>
                    <button class="box" aria-label="Cell 3"></button>
                    <button class="box" aria-label="Cell 4"></button>
                    <button class="box" aria-label="Cell 5"></button>
                    <button class="box" aria-label="Cell 6"></button>
                    <button class="box" aria-label="Cell 7"></button>
                    <button class="box" aria-label="Cell 8"></button>
                    <button class="box" aria-label="Cell 9"></button>
                </div>
            </div>

            <div class="actions">
                <button id="reset-btn" class="action-btn">Reset Game</button>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
